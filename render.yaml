# ACFO Mail

Render-ready Gmail client restricted to `contact.acfo.admin@gmail.com`.

## Upload
Upload all files to the root of your GitHub repository. Leave Render Root Directory blank. Use `npm install` and `npm start`.

## Render environment variables
Set `GOOGLE_CLIENT_ID`, `GOOGLE_CLIENT_SECRET`, `SESSION_SECRET`, and `DATABASE_URL`. Also set:

- `NODE_ENV=production`
- `BASE_URL=https://sfrs-email.onrender.com`
- `GOOGLE_REDIRECT_URI=https://sfrs-email.onrender.com/auth/google/callback`
- `ALLOWED_EMAIL=contact.acfo.admin@gmail.com`

Use a Render PostgreSQL **Internal Database URL** for `DATABASE_URL`.

## Google Cloud
Enable Gmail API. Add `https://sfrs-email.onrender.com` as an authorised JavaScript origin and `https://sfrs-email.onrender.com/auth/google/callback` as an authorised redirect URI. While testing, add the Gmail account as a test user.

Never commit private secrets.
