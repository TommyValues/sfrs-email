<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#0b1f3a">
  <title>ACFO Mail</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="toast" class="toast"></div>

  <section id="login" class="login hidden">
    <div class="login-card">
      <div class="logo">A</div>
      <p class="eyebrow">Secure communications portal</p>
      <h1>ACFO Mail</h1>
      <p>Sign in to manage <strong id="allowed-email">contact.acfo.admin@gmail.com</strong>.</p>
      <a href="/auth/google" class="google-button">Continue with Google</a>
      <p id="oauth-warning" class="warning hidden"></p>
    </div>
  </section>

  <div id="app" class="app hidden">
    <header class="topbar">
      <button id="menu-button" class="icon-button">☰</button>
      <div class="brand"><span>A</span><strong>ACFO Mail</strong></div>

      <form id="search-form" class="search">
        <input id="search" type="search" placeholder="Search mail">
      </form>

      <button id="refresh-button" class="icon-button">↻</button>

      <div class="profile">
        <img id="avatar" alt="">
        <div>
          <strong id="profile-name">ACFO Admin</strong>
          <small id="profile-email"></small>
        </div>
        <button id="logout-button">Sign out</button>
      </div>
    </header>

    <div class="workspace">
      <aside id="sidebar" class="sidebar">
        <button id="compose-button" class="compose">＋ Compose</button>
        <nav>
          <button class="nav-item active" data-folder="inbox">Inbox</button>
          <button class="nav-item" data-folder="starred">Starred</button>
          <button class="nav-item" data-folder="sent">Sent</button>
          <button class="nav-item" data-folder="drafts">Drafts</button>
          <button class="nav-item" data-folder="trash">Trash</button>
        </nav>
      </aside>

      <main class="main">
        <section id="list-view" class="panel">
          <div class="toolbar">
            <h1 id="folder-title">Inbox</h1>
            <span id="status"></span>
          </div>
          <div id="message-list"></div>
        </section>

        <section id="reader" class="panel reader hidden">
          <div class="reader-actions">
            <button id="back-button">← Back</button>
            <button id="delete-button">Move to trash</button>
          </div>
          <h1 id="reader-subject"></h1>
          <div class="reader-meta">
            <div>
              <strong id="reader-from"></strong>
              <div id="reader-to"></div>
            </div>
            <time id="reader-date"></time>
          </div>
          <pre id="reader-body"></pre>
          <button id="reply-button">Reply</button>
        </section>
      </main>
    </div>
  </div>

  <div id="compose-modal" class="modal hidden">
    <form id="compose-form" class="compose-window">
      <header>
        <strong>New message</strong>
        <button type="button" id="close-compose">×</button>
      </header>
      <input id="compose-to" type="email" placeholder="Recipient" required>
      <input id="compose-subject" placeholder="Subject">
      <textarea id="compose-body" placeholder="Write your message"></textarea>
      <footer>
        <button type="submit">Send</button>
        <span id="send-status"></span>
      </footer>
    </form>
  </div>

  <script src="/app.js" defer></script>
</body>
</html>
