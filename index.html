<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACFO Mail</title>
  <link rel="stylesheet" href="/styles.css" />
</head>

<body>
  <div id="loginScreen" class="login">
    <div class="login-card">
      <div class="logo-mark">A</div>
      <h1>ACFO Mail</h1>
      <p>Sign in to access contact.acfo.admin@gmail.com</p>

      <a class="google-button" href="/auth/google">
        Continue with Google
      </a>

      <p id="loginError" class="error-message"></p>
    </div>
  </div>

  <div id="mailApp" class="app-shell hidden">
    <header class="topbar">
      <div class="brand">
        <div class="brand-icon">A</div>
        <span>ACFO Mail</span>
      </div>

      <div class="search">
        <input
          id="searchInput"
          type="search"
          placeholder="Search mail"
          autocomplete="off"
        />
      </div>

      <div class="profile">
        <div class="profile-text">
          <strong>ACFO Admin</strong>
          <small id="accountEmail">
            contact.acfo.admin@gmail.com
          </small>
        </div>

        <button id="logoutButton" class="text-button">
          Sign out
        </button>
      </div>
    </header>

    <div class="workspace">
      <aside class="sidebar">
        <button id="composeButton" class="compose">
          Compose
        </button>

        <nav>
          <button class="nav-item active" data-folder="inbox">
            Inbox
          </button>

          <button class="nav-item" data-folder="starred">
            Starred
          </button>

          <button class="nav-item" data-folder="sent">
            Sent
          </button>

          <button class="nav-item" data-folder="drafts">
            Drafts
          </button>

          <button class="nav-item" data-folder="trash">
            Trash
          </button>
        </nav>
      </aside>

      <main class="main">
        <section id="messageListView">
          <div class="mail-toolbar">
            <h2 id="folderTitle">Inbox</h2>

            <button id="refreshButton" class="icon-button">
              Refresh
            </button>
          </div>

          <div id="loadingMessage" class="empty">
            Loading messages…
          </div>

          <div id="messageList"></div>
        </section>

        <section id="readerView" class="reader hidden">
          <div class="reader-actions">
            <button id="backButton">← Back</button>
            <button id="deleteButton">Delete</button>
          </div>

          <h1 id="readerSubject"></h1>

          <div class="reader-meta">
            <strong id="readerFrom"></strong>
            <span id="readerDate"></span>
          </div>

          <div id="readerTo" class="reader-to"></div>
          <pre id="readerBody" class="reader-body"></pre>

          <button id="replyButton" class="reply-button">
            Reply
          </button>
        </section>
      </main>
    </div>
  </div>

  <div id="composeModal" class="modal hidden">
    <div class="compose-window">
      <header>
        <strong>New message</strong>
        <button id="closeComposeButton">×</button>
      </header>

      <input
        id="composeTo"
        type="email"
        placeholder="Recipients"
      />

      <input
        id="composeSubject"
        type="text"
        placeholder="Subject"
      />

      <textarea
        id="composeBody"
        placeholder="Write your message"
      ></textarea>

      <footer>
        <button id="sendButton" class="send-button">
          Send
        </button>
      </footer>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="/app.js"></script>
</body>
</html>
